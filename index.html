<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph-Based Music Recommender</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Graph-Based Music Recommender</h1>

  <label>Genre</label>
  <input id="genre" placeholder="e.g., Pop" />

  <label>Mood (optional)</label>
  <input id="mood" placeholder="e.g., Happy" />

  <label>Partial Chords (optional, comma-separated)</label>
  <input id="chords" placeholder="e.g., Am,F,C,G" />

  <button id="go">Get Recommendations</button>

  <h2>Results</h2>
  <div id="results"></div>

  <!-- 🔥 Add your JS at the end so DOM loads first -->
  <script src="main.js"></script>
</body>
</html>
